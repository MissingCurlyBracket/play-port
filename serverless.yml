service: play-port-api

provider:
  name: aws
  runtime: nodejs20.x
  region: eu-central-1
  environment:
    WATCHMODE_API_KEY: ${env:WATCHMODE_API_KEY}
    TMDB_READ_ACCESS_TOKEN: ${env:TMDB_READ_ACCESS_TOKEN}

functions:
  searchByName:
    handler: functions/handler.searchByName
    events:
      - httpApi:
          path: /search
          method: get
  searchMovie:
    handler: functions/handler.searchMovie
    events:
      - httpApi:
          path: /search/movie
          method: get
  searchTv:
    handler: functions/handler.searchTv
    events:
      - httpApi:
          path: /search/tv
          method: get
  getMovieProviders:
    handler: functions/handler.getMovieProviders
    events:
      - httpApi:
          path: /movie/{movieId}/providers
          method: get
  getTvProviders:
    handler: functions/handler.getTvProviders
    events:
      - httpApi:
          path: /tv/{seriesId}/providers
          method: get
  autocomplete:
    handler: functions/handler.autocomplete
    events:
      - httpApi:
          path: /autocomplete
          method: get
  getStreamingSources:
    handler: functions/handler.getStreamingSources
    events:
      - httpApi:
          path: /title/{id}/sources
          method: get

plugins:
  - serverless-offline

build:
  esbuild:
    bundle: true
    minify: false
    sourcemap: true
    exclude: [ 'aws-sdk' ]
    target: 'node20'
    define: { 'require.resolve': undefined }
    platform: 'node'
    tsconfig: 'functions/tsconfig.json'


